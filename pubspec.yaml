name: microflow_pro
description: "MicroFlow Pro - Premium Micro-Finance Management Ecosystem"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Backend
  supabase_flutter: ^2.8.0

  # UI/Design
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  connectivity_plus: ^6.1.1
  http: ^1.6.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  qr_flutter: ^4.1.0
  url_launcher: 6.3.1
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_driver:
    sdk: flutter

flutter:
  uses-material-design: true